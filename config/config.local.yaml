service_name: gateway-service
env: local
version: dev

log_level: debug
shutdown_timeout: 10s

http:
  port: 8083
  timeout: 5s

http_tls:
  enabled: false
  cert_file: ""
  key_file: ""


catalog_grpc:
  addr: localhost:9091
  timeout: 3s

auth_grpc:
  addr: localhost:44044
  timeout: 3s

auth_tls:
  enabled: false
  ca_file: ""
  server_name: ""

otlp:
  endpoint: localhost:4317

swagger:
  ui_path: web/swagger/index.html
  spec_path: openapi/gateway.v1.yaml
