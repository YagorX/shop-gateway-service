post:
  tags: [Auth]
  summary: Logout and revoke refresh token
  operationId: logout
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../gateway.v1.yaml#/components/schemas/LogoutRequest'
  responses:
    '200':
      description: Logout succeeded
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/LogoutResponse'
    '400':
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
    '401':
      description: Invalid refresh token
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
    '500':
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
