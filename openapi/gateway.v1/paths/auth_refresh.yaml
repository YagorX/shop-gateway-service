post:
  tags: [Auth]
  summary: Refresh access and refresh tokens
  operationId: refreshTokens
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../gateway.v1.yaml#/components/schemas/RefreshRequest'
  responses:
    '200':
      description: Tokens refreshed
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/LoginResponse'
    '400':
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
    '401':
      description: Invalid refresh token
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
    '500':
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
