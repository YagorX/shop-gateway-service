post:
  tags: [Auth]
  summary: Validate access token
  operationId: validateToken
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../gateway.v1.yaml#/components/schemas/ValidateRequest'
  responses:
    '200':
      description: Token is valid
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ValidateResponse'
    '400':
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
    '401':
      description: Token is invalid
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
    '500':
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '../../gateway.v1.yaml#/components/schemas/ErrorEnvelope'
